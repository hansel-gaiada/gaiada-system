# Gaiada trial stack — everything on one VPS with one command:
#   cd infra/compose && cp .env.example .env   # fill it in
#   docker compose -f docker-compose.vps.yml up -d --build
# Only WAHA's dashboard (localhost) and nothing else is exposed beyond the box;
# the bot reaches Telegram/WAHA outbound. Backups: see ../scripts/backup.sh + the runbook.
name: gaiada

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gaiada # bootstrap/maintenance DB only; app data lives in gaiada_platform/_knowledge/_bot
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PASSWORD:?}
      # Per-service owner (migrator) + runtime roles — see infra/db/init-cluster.sh (DB topology plan).
      # (bot roles live on the isolated pg-bot instance, not here.)
      PLATFORM_OWNER_PASSWORD: ${PLATFORM_OWNER_PASSWORD:?}
      PLATFORM_APP_PASSWORD: ${PLATFORM_APP_PASSWORD:?}
      SYNC_APP_PASSWORD: ${SYNC_APP_PASSWORD:?}
      KNOWLEDGE_OWNER_PASSWORD: ${KNOWLEDGE_OWNER_PASSWORD:?}
      KNOWLEDGE_APP_PASSWORD: ${KNOWLEDGE_APP_PASSWORD:?}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD:?}
    ports:
      - "127.0.0.1:55433:5432" # localhost-only; lets the standalone automation stack (n8n) reach gaiada_n8n
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../../infra/db/init-cluster.sh:/docker-entrypoint-initdb.d/10-init-cluster.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gaiada"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Isolated instance for the WhatsApp bot's PII/crypto-shred store (DB topology plan Phase E).
  pg-bot:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gaiada # bootstrap DB only; the bot store lives in gaiada_bot
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PASSWORD:?}
      BOT_OWNER_PASSWORD: ${BOT_OWNER_PASSWORD:?}
      BOT_APP_PASSWORD: ${BOT_APP_PASSWORD:?}
    volumes:
      - pg-bot-data:/var/lib/postgresql/data
      - ../../infra/db/init-bot.sh:/docker-entrypoint-initdb.d/10-init-bot.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gaiada"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Core Redis — platform event backbone (Redis Streams relay/consumer + dead-letter).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  # Bot Redis — BullMQ media queue, isolated with the bot's data plane (DB topology plan Phase F).
  redis-bot:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-bot-data:/data

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # dashboard via SSH tunnel only; never public
    environment:
      WHATSAPP_HOOK_URL: "http://bot:3001/webhook?token=${WEBHOOK_SECRET:?}"
      WHATSAPP_HOOK_EVENTS: "message"
      WHATSAPP_API_KEY: ${WAHA_API_KEY:?}
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:?}
      WHATSAPP_RESTART_ALL_SESSIONS: "True"
    volumes:
      - waha-sessions:/app/.sessions

  # AI gateway — the Go service (ai-gateway-go/) IS the gateway. The Node ai-gateway/ it
  # replaced was retired 2026-07-14 after code-complete parity + green build/tests; the service
  # keeps the name `ai-gateway` on port 3002 so every caller (bot, hub, knowledge, media-worker)
  # reaches it unchanged at http://ai-gateway:3002.
  # TLS is OFF here so the plain-HTTP contract callers speak keeps working; switch
  # GATEWAY_TLS_MODE to permissive/enforced once callers are enrolled with client certs.
  ai-gateway:
    build: ../../ai-gateway-go
    restart: unless-stopped
    environment:
      # GATEWAY_PORT defaults to 3002 in config.go — left unset so callers need no URL change.
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Local-first: point at an Ollama on the VPS (e.g. http://host.docker.internal:11434);
      # empty disables the local provider and the chain goes straight to cloud/echo.
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      WHISPER_URL: http://whisper:8000
      WHISPER_MODEL: ${WHISPER_MODEL:-Systran/faster-whisper-small}
      GATEWAY_DAILY_CALL_CAP: ${GATEWAY_DAILY_CALL_CAP:-2000}
      GATEWAY_TLS_MODE: "off"
      GATEWAY_TOPOLOGY_MODE: central
      # Model-assisted DLP classifier stays opt-in; enable only where Ollama is reachable.
      DLP_CLASSIFIER_ENABLED: ${DLP_CLASSIFIER_ENABLED:-false}
      EGRESS_ALLOWLIST: generativelanguage.googleapis.com,api.anthropic.com,whisper,host.docker.internal
    volumes:
      - gateway-data:/app/data # egress audit (JSONL)

  # Keycloak (5b) — self-hosted IdP. Realm imported from ./keycloak on first boot. Backed by
  # Postgres (gaiada_keycloak) instead of embedded H2 (DB topology plan Phase D) — durable + backed
  # up with the core instance. Kept on start-dev for the trial (no TLS/hostname setup); a prod
  # deploy should move to `start` (KC_HOSTNAME + TLS) — see the plan's deploy notes.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?}
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/gaiada_keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - kc-data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy

  # Cerbos (5b) — policy decision point. Policies from ./cerbos/policies (read-only).
  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    restart: unless-stopped
    command: ["server", "--config=/config/cerbos.yaml"]
    volumes:
      - ../../platform-nest/cerbos:/config:ro
      - ../../platform-nest/cerbos/policies:/policies:ro

  platform:
    build: ../../platform-nest
    restart: unless-stopped
    environment:
      PLATFORM_SERVICE_TOKEN: ${PLATFORM_SERVICE_TOKEN:?}
      # Runtime = restricted platform_app; migrations/grants run as platform_owner (MIGRATE_DATABASE_URL).
      DATABASE_URL: postgres://platform_app:${PLATFORM_APP_PASSWORD:?}@postgres:5432/gaiada_platform
      MIGRATE_DATABASE_URL: postgres://platform_owner:${PLATFORM_OWNER_PASSWORD:?}@postgres:5432/gaiada_platform
      AUTH_MODE: ${PLATFORM_AUTH_MODE:-dev}
      OIDC_ISSUER: http://keycloak:8080/realms/gaiada
      OIDC_JWKS_URI: http://keycloak:8080/realms/gaiada/protocol/openid-connect/certs
      OIDC_AUDIENCE: gaiada-platform
      CERBOS_URL: http://cerbos:3592
      # 5c.4 file store — persistent volume so attachments survive restarts.
      FILES_DIR: /data/files
      REDIS_URL: redis://redis:6379
      # Admin/Systems console aggregator (Phase C) — read-only probes of each downstream
      # service. All fail-soft: an unset URL just reports "not configured" in the console.
      GATEWAY_URL: http://ai-gateway:3002
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:-}
      BOT_URL: http://bot:3001
      ADMIN_TOKEN: ${BOT_ADMIN_TOKEN:-}
      HUB_URL: http://mcp-hub:3003
      HUB_SERVICE_TOKEN: ${HUB_SERVICE_TOKEN:-}
      KNOWLEDGE_URL: http://knowledge:3005
      KNOWLEDGE_SERVICE_TOKEN: ${KNOWLEDGE_SERVICE_TOKEN:-}
      # Automation is the separate `gaiada-automation` n8n stack; set these only if n8n is
      # reachable from this network. AUTOMATION_API_KEY is an n8n Public-API key → the
      # Systems→Automation console then lists real workflows + last-run.
      AUTOMATION_URL: ${AUTOMATION_URL:-}
      AUTOMATION_API_KEY: ${AUTOMATION_API_KEY:-}
      # Event → n8n bridge (WS4 §4). Off unless all four are set. N8N_BRIDGE_SECRET must match
      # the value the event workflows check. Only set N8N_WEBHOOK_BASE_URL if n8n is reachable.
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-}
      N8N_BRIDGE_SECRET: ${N8N_BRIDGE_SECRET:-}
      N8N_BRIDGE_EVENTS: ${N8N_BRIDGE_EVENTS:-}
      N8N_BRIDGE_ENTITY_TYPES: ${N8N_BRIDGE_ENTITY_TYPES:-}
      # Event → knowledge-graph bridge (WS8 Step E). Forwards business events on these entity streams
      # to the knowledge service /graph/ingest (reuses KNOWLEDGE_URL/TOKEN above). Off unless set.
      GRAPH_BRIDGE_ENTITY_TYPES: ${GRAPH_BRIDGE_ENTITY_TYPES:-}
    volumes:
      - platform-files:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      # Every request authorizes against Cerbos; start it first (fail-closed if it's down).
      cerbos:
        condition: service_started
      redis:
        condition: service_started

  # Sync engine (WS1 T2) — CENTRAL role. Serves push/pull over mTLS to remote site nodes and runs
  # the tombstone GC sweep. Reconciles the SAME gaiada_platform DB the platform writes (the sync
  # tables + the outbox hlc column ship in platform-nest migrations 0012/0013). Idle until a real
  # second site is enrolled; deploying it now is harmless (no site nodes → nothing to serve).
  # ONE-TIME cert provisioning (mTLS is mandatory here, unlike the gateway): the gateway persists
  # the internal CA to the gateway-data volume; issue this node's server cert from it once, e.g.
  #   docker compose run --rm --entrypoint /synccert sync-central \
  #     -ca-cert /gateway-ca/ca-cert.pem -ca-key /gateway-ca/ca-key.pem \
  #     -cn central -out-cert /app/data/sync.crt -out-key /app/data/sync.key
  # then issue each site node's client cert (CN = its NODE_ID) and add it to site_subscriptions.
  sync-central:
    build: ../../sync-engine-go
    restart: unless-stopped
    environment:
      SYNC_MODE: central
      NODE_ID: central
      # Runtime = restricted sync_app (scoped to the sync footprint; DENIED platform-internal tables).
      DATABASE_URL: postgres://sync_app:${SYNC_APP_PASSWORD:?}@postgres:5432/gaiada_platform
      SYNC_LISTEN_ADDR: 0.0.0.0:3013
      SYNC_CA_CERT: /gateway-ca/ca-cert.pem
      SYNC_CERT: /app/data/sync.crt
      SYNC_KEY: /app/data/sync.key
      # Empty = accept any CA-signed node (the site_subscriptions ACL is then the sole tenant
      # gate); set to a comma list of node CNs to also pin an allowlist.
      SYNC_ALLOWED_CNS: ${SYNC_ALLOWED_CNS:-}
    volumes:
      - sync-data:/app/data
      - gateway-data:/gateway-ca:ro # reuse the gateway's persisted internal CA
    depends_on:
      postgres:
        condition: service_healthy

  platform-ui:
    build: ../../platform-ui
    restart: unless-stopped
    environment:
      PLATFORM_URL: http://platform:3004
      PLATFORM_SERVICE_TOKEN: ${PLATFORM_SERVICE_TOKEN:?}
      SESSION_SECRET: ${UI_SESSION_SECRET:?}
    ports:
      - "3005:3005"
    depends_on:
      - platform

  # Self-hosted transcription (5a.3) — CPU image; audio transcribes locally, never
  # leaving the box. First request downloads the model into the volume (be patient).
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    volumes:
      - whisper-models:/root/.cache/huggingface

  knowledge:
    build:
      context: ../../ai-agents
    command: ["npx", "tsx", "src/knowledge/service.ts"]
    restart: unless-stopped
    environment:
      KNOWLEDGE_SERVICE_TOKEN: ${KNOWLEDGE_SERVICE_TOKEN:?}
      # Runtime = knowledge_app; schema DDL runs as knowledge_owner (MIGRATE_DATABASE_URL).
      KNOWLEDGE_DATABASE_URL: postgres://knowledge_app:${KNOWLEDGE_APP_PASSWORD:?}@postgres:5432/gaiada_knowledge
      MIGRATE_DATABASE_URL: postgres://knowledge_owner:${KNOWLEDGE_OWNER_PASSWORD:?}@postgres:5432/gaiada_knowledge
      PLATFORM_URL: http://platform:3004
      PLATFORM_SERVICE_TOKEN: ${PLATFORM_SERVICE_TOKEN:?}
      GATEWAY_URL: http://ai-gateway:3002
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?}
    depends_on:
      postgres:
        condition: service_healthy
      platform:
        condition: service_started
      ai-gateway:
        condition: service_started

  mcp-hub:
    build: ../../mcp-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003" # localhost-only; lets the standalone automation stack (n8n) reach the hub
    environment:
      HUB_SERVICE_TOKEN: ${HUB_SERVICE_TOKEN:?}
      GATEWAY_URL: http://ai-gateway:3002
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?}
      PLATFORM_URL: http://platform:3004
      PLATFORM_SERVICE_TOKEN: ${PLATFORM_SERVICE_TOKEN:?}
      KNOWLEDGE_URL: http://knowledge:3005
      KNOWLEDGE_SERVICE_TOKEN: ${KNOWLEDGE_SERVICE_TOKEN:?}
      # WS2 §5: make the versioned `mcp_tool` Cerbos policy authoritative (in-code stays as fallback).
      CERBOS_URL: http://cerbos:3592
      # WS2 §7: site hub (fronts this platform). The central hub runs as mcp-hub-central below.
      HUB_TOPOLOGY: site
      # WS2 §3: mTLS off until certs are enrolled (mirrors the gateway's GATEWAY_TLS_MODE: off).
      # Enroll with synccert (see mcp-hub/.env.example), mount them, then set HUB_TLS_MODE: enforced.
      HUB_TLS_MODE: ${HUB_TLS_MODE:-off}
      # WS11 delivery tools (build item 9). All fail CLOSED when unset (github.repoStatus / deploy.staging
      # simply refuse), so leaving these blank is safe — set them to enable the code + deploy stages.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ORG: ${GITHUB_ORG:-}
      DEPLOY_STAGING_URL: ${DEPLOY_STAGING_URL:-}
      DEPLOY_STAGING_TOKEN: ${DEPLOY_STAGING_TOKEN:-}
    volumes:
      - hub-data:/app/data # tool audit
    depends_on:
      - ai-gateway
      - platform
      - cerbos

  # Central hub (WS2 §7): SAME codebase, HUB_TOPOLOGY=central — adds cross-company/management tools
  # (real rollup.metrics over the platform's D12 /rollups read). Idle-but-defined like sync-central;
  # in a single-region v1 it points at the same platform. Not published (reach it via the internal
  # network / an enrolled mTLS peer). Give it a real second-site platform URL when one exists.
  mcp-hub-central:
    build: ../../mcp-hub
    restart: unless-stopped
    profiles: ["central"] # only starts with `--profile central`
    environment:
      HUB_SERVICE_TOKEN: ${HUB_SERVICE_TOKEN:?}
      GATEWAY_URL: http://ai-gateway:3002
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?}
      PLATFORM_URL: http://platform:3004
      PLATFORM_SERVICE_TOKEN: ${PLATFORM_SERVICE_TOKEN:?}
      KNOWLEDGE_URL: http://knowledge:3005
      KNOWLEDGE_SERVICE_TOKEN: ${KNOWLEDGE_SERVICE_TOKEN:?}
      CERBOS_URL: http://cerbos:3592
      HUB_TOPOLOGY: central
      HUB_TLS_MODE: ${HUB_TLS_MODE:-off}
    volumes:
      - hub-central-data:/app/data
    depends_on:
      - ai-gateway
      - platform
      - cerbos

  bot:
    build: ../../wa-chat-bot
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      GATEWAY_URL: http://ai-gateway:3002
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?}
      WAHA_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:?}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Isolated bot instance (pg-bot) + bot Redis (redis-bot). Runtime = bot_app; DDL = bot_owner.
      DATABASE_URL: postgres://bot_app:${BOT_APP_PASSWORD:?}@pg-bot:5432/gaiada_bot
      MIGRATE_DATABASE_URL: postgres://bot_owner:${BOT_OWNER_PASSWORD:?}@pg-bot:5432/gaiada_bot
      MANAGEMENT_GROUP_ID: ${MANAGEMENT_GROUP_ID:-}
      POST_TO_GROUPS: ${POST_TO_GROUPS:-false}
      REDIS_URL: redis://redis-bot:6379
    volumes:
      - bot-data:/app/data # LocalKms keys + schedule state + discovery (EXCLUDE keys.json from backups!)
      - ./groups.yaml:/app/config/groups.yaml:ro
    depends_on:
      pg-bot:
        condition: service_healthy
      ai-gateway:
        condition: service_started

  bot-media-worker:
    build: ../../wa-chat-bot
    command: ["npx", "tsx", "src/media-worker.ts"]
    restart: unless-stopped
    environment:
      GATEWAY_URL: http://ai-gateway:3002
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?}
      WAHA_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:?}
      DATABASE_URL: postgres://bot_app:${BOT_APP_PASSWORD:?}@pg-bot:5432/gaiada_bot
      MIGRATE_DATABASE_URL: postgres://bot_owner:${BOT_OWNER_PASSWORD:?}@pg-bot:5432/gaiada_bot
      REDIS_URL: redis://redis-bot:6379
      MEDIA_WORKER_CONCURRENCY: ${MEDIA_WORKER_CONCURRENCY:-2}
    volumes:
      - bot-data:/app/data
    depends_on:
      pg-bot:
        condition: service_healthy
      redis-bot:
        condition: service_started

volumes:
  pg-data:
  pg-bot-data:
  redis-data:
  redis-bot-data:
  whisper-models:
  kc-data:
  waha-sessions:
  gateway-data:
  hub-data:
  hub-central-data:
  bot-data:
  platform-files:
  sync-data:
