# WS9 blackbox_exporter — synthetic HTTP probes for the key service endpoints. Prometheus passes
# each target as ?target=; a 2xx (or the UI's 200) within 8s is a success. probe_success feeds the
# availability SLO + the ServiceDown alert.
modules:
  http_2xx:
    prober: http
    timeout: 8s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [] # default = any 2xx
      method: GET
      preferred_ip_protocol: ip4
      fail_if_not_ssl: false
