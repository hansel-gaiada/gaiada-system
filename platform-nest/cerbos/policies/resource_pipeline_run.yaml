apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: pipeline_run
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # The dispatcher/delivery automation accounts (member/manager) create + advance runs; elevated
    # humans may too. Same low-privilege create posture as automation_approval.
    - actions: ["create", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Reading pipeline runs (the internal dashboard) is elevated.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "group_executive"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
