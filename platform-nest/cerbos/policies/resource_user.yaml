apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: user
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # Reading the user/role directory (admin console) — admins and managers.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Inviting/editing members + assigning/revoking role grants — company admins only.
    - actions: ["create", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
