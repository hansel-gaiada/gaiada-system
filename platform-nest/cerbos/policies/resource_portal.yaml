apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: portal
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # An authenticated client of this tenant may read the portal and act on their client-side gates
    # (sign PRD / scope, submit feedback). Per-run isolation (only THEIR runs) is enforced in the
    # portal controller via run.client_id -> clients.portal_user_id. Staff may also read (support).
    - actions: ["read", "decide", "sign"]
      effect: EFFECT_ALLOW
      derivedRoles: ["client"]
      condition: { match: { expr: "variables.inTenant" } }
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "group_executive"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
