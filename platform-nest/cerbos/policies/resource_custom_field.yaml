apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: custom_field
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # Any member may read field defs (the UI renders dynamic forms from them).
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Only admins/managers define fields.
    - actions: ["create", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
