apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: pm_project
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin", "group_executive"]
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Owner/status + milestones + docs are managed by leads/admins (UI gates on pm.manage).
    - actions: ["manage"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
