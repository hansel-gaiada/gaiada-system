apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: knowledge_source
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin", "group_executive"]
    # Reviewing quarantined sources (approve/reject) — company admins (knowledge.review).
    - actions: ["read", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
