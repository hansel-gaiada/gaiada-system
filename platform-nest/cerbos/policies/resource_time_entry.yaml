apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: time_entry
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Any tenant member may log time (create); the row is owned by the logger.
    - actions: ["create"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Managers/admins may amend any entry; a member only their OWN.
    - actions: ["update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    - actions: ["update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["member"]
      condition: { match: { expr: "variables.inTenant && variables.notLow && variables.owns" } }
