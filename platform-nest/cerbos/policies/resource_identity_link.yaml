apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: identity_link
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # Identity links are PII (external chat identity -> user): company admins only.
    # read = list, update = verify, delete = unlink.
    - actions: ["read", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
