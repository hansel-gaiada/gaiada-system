apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: team
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    - actions: ["create", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # A team lead may manage THEIR OWN team (the team_lead derived role already binds the
    # grant's scopeId to this team's id) — update covers member add/remove.
    - actions: ["update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
