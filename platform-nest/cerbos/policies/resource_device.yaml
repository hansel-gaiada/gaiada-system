apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: device
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin", "group_executive"]
    # Any member of the company can view the device registry / topology / monitoring.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Register / edit / heartbeat-ingest — company admins and IT staff only.
    - actions: ["create", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "it_staff"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
