apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: company
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    # Global-elevated roles manage the whole holding (create/update/delete/read any company).
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin", "group_executive"]
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    - actions: ["update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
