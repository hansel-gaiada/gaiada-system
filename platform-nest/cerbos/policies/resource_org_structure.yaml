apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: org_structure
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # Group executive (owner) is a global role — cross-company, not membership-gated.
    - actions: ["read", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["group_executive"]
      condition: { match: { expr: "variables.notLow" } }
    # Any in-tenant member may read the org chart.
    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Editing the structure is elevated: company admins (in-tenant).
    - actions: ["update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
