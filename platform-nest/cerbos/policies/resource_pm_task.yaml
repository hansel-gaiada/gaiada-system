apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: pm_task
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin", "group_executive"]
    # Read + execution updates (progress/status/subtasks/time/tracker-run) — any member.
    - actions: ["read", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "member", "viewer", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
    # Management actions (create/delete + assignee/meta changes + suggestion confirm) — leads/admins.
    - actions: ["create", "delete", "manage"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin", "manager", "team_lead"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
