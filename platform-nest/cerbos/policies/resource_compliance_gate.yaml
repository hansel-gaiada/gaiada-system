apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: compliance_gate
  importDerivedRoles: ["gaiada_scopes"]
  variables:
    import: ["gaiada_common"]
  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles: ["platform_admin"]
    # Group executive (owner) — global, cross-company.
    - actions: ["read", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["group_executive"]
      condition: { match: { expr: "variables.notLow" } }
    # Compliance gates are an admin surface: company admins only.
    - actions: ["read", "update"]
      effect: EFFECT_ALLOW
      derivedRoles: ["company_admin"]
      condition: { match: { expr: "variables.inTenant && variables.notLow" } }
