# WS10 — supply-chain-secure release pipeline (roadmap §"CI/CD with supply-chain security baked in":
# Sigstore signing + SBOM + SLSA provenance). Builds each component image, pushes to GHCR, then for
# every image: generates an SBOM, signs the image + SBOM with cosign KEYLESS (Sigstore OIDC — no keys
# in the repo, aligns with WS10 §1 "no secrets in repos"), and emits a SLSA build-provenance
# attestation. Runs on a version tag or manual dispatch (deploy is decoupled from build).
#
# Verify a released image before deploy:
#   cosign verify ghcr.io/<owner>/gaiada-<component>:<tag> \
#     --certificate-identity-regexp "https://github.com/<owner>/.+/.github/workflows/release.yml@.+" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
#   cosign verify-attestation --type spdxjson ...   # SBOM
#   gh attestation verify oci://ghcr.io/<owner>/gaiada-<component>:<tag> --owner <owner>  # SLSA provenance
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to the git ref name)"
        required: false

permissions:
  contents: read
  packages: write # push images to GHCR
  id-token: write # Sigstore keyless signing + provenance (OIDC)
  attestations: write # actions/attest-build-provenance

jobs:
  build-sign:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - wa-chat-bot
          - mcp-hub
          - ai-agents
          - ai-gateway-go
          - sync-engine-go
          - platform-nest
          - platform-ui
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/gaiada-${{ matrix.component }}
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          provenance: false # we attach a richer SLSA attestation below
          sbom: false # we generate + attest the SBOM explicitly below

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Sign image (keyless)
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Attest SBOM to the image (keyless)
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
