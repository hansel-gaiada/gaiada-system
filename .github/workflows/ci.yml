# CI for the gaiada-system components. NOTE: GitHub only runs workflows from the
# REPOSITORY ROOT — this activates when gaiada-system is pushed as its own repository
# (currently it lives inside a larger working folder with no gaiada remote).
# Until then, run the same checks locally: sh infra/scripts/test-all.sh
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # platform-nest has its own job below (it needs Postgres + Cerbos to actually run its
        # suite). These three run standalone; their DB-backed suites self-skip without a test DB.
        project: [wa-chat-bot, mcp-hub, ai-agents]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # platform-nest (WS1 core) — its suite is meaningful only against live Postgres + Cerbos, so
  # it gets a dedicated job. The vitest harness (src/testing/setup.ts) DROP SCHEMAs + applies
  # migrations itself and repoints at a NOBYPASSRLS role, so CI only supplies a superuser test DB,
  # Cerbos, and Redis (event/relay suites self-skip without REDIS_URL).
  platform-nest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: platform-nest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform-nest/package-lock.json
      # Cerbos runs as a step (not a service) so it can mount the checked-out policy repo.
      - name: Start Cerbos
        run: |
          docker run -d --name cerbos -p 3592:3592 \
            -v "$PWD/cerbos:/config:ro" -v "$PWD/cerbos/policies:/policies:ro" \
            ghcr.io/cerbos/cerbos:latest server --config=/config/cerbos.yaml
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3592/_cerbos/health && break || sleep 1
          done
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
        env:
          DATABASE_URL_TEST: postgres://postgres:postgres@localhost:5432/postgres
          CERBOS_URL: http://localhost:3592
          REDIS_URL: redis://localhost:6379

  # ai-gateway is the Go service (ai-gateway-go/); it replaced the retired Node gateway.
  gateway-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-gateway-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false # stdlib-only module, no go.sum to key a cache on
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  # sync-engine-go (WS1 T2 cross-site reconciliation). Runs the FULL suite incl. the DB-backed
  # convergence/chaos tests, against two databases with the platform-nest migrations applied and
  # a NOBYPASSRLS role (superusers bypass RLS and would test nothing).
  sync-engine-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: sync-engine-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Provision two DBs + NOBYPASSRLS role + migrations
        env:
          PGPASSWORD: postgres
        run: |
          for dbname in gaiada_sync_test gaiada_sync_central; do
            psql -h localhost -U postgres -c "CREATE DATABASE $dbname;"
            for f in $(ls ../platform-nest/migrations/*.sql | sort); do
              psql -h localhost -U postgres -d "$dbname" -v ON_ERROR_STOP=1 -f "$f" >/dev/null
            done
            psql -h localhost -U postgres -d "$dbname" -c "DO \$\$ BEGIN CREATE ROLE sync_app LOGIN PASSWORD 'test' NOSUPERUSER NOBYPASSRLS; EXCEPTION WHEN duplicate_object THEN NULL; END \$\$; GRANT USAGE ON SCHEMA public TO sync_app; GRANT SELECT,INSERT,UPDATE,DELETE ON ALL TABLES IN SCHEMA public TO sync_app;"
          done
      - run: go build ./...
      - run: go vet ./...
      - name: go test (full suite incl. convergence/chaos)
        env:
          DATABASE_URL_TEST: postgres://sync_app:test@localhost:5432/gaiada_sync_test
          DATABASE_URL_CENTRAL: postgres://sync_app:test@localhost:5432/gaiada_sync_central
          DATABASE_URL_SITE_A: postgres://sync_app:test@localhost:5432/gaiada_sync_test
        run: go test ./...
